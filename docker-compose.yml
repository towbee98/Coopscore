services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: coopscore
      POSTGRES_PASSWORD: coopscore
      POSTGRES_DB: coopscore
    ports:
      - "5432:5432"
    volumes:
      - coopscore_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coopscore -d coopscore"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  coopscore_pgdata:
